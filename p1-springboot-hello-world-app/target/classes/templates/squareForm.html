<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Square Checker</h2>

<form th:action="@{/square}" th:object="${squareData}" method="post">

    <label>A:</label>
    <input type="number" th:field="*{a}" />

    <label>B:</label>
    <input type="number" th:field="*{b}" />

    <br><br>
    <button type="submit">Check</button>

</form>

</body>
</html>
